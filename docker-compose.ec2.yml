services:
  db:
    image: postgres:17
    container_name: scannerx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - scannerx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scannerx-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      APP_QUEUE_MODE: local
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS}
      PORT: 8080

  caddy:
    image: caddy:2
    container_name: scannerx-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      SCANNERX_HOST: ${SCANNERX_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/aws/Caddyfile:/etc/caddy/Caddyfile:ro
      - scannerx_caddy_data:/data
      - scannerx_caddy_config:/config

volumes:
  scannerx_postgres_data:
  scannerx_caddy_data:
  scannerx_caddy_config:
