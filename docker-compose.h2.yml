# ScannerX Docker Compose - Local H2 Testing
# Use this to test the phone deployment setup locally
# Includes backend with H2 database and frontend

version: "3.8"

services:
  # Backend API - H2 Database (matches phone deployment)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scannerx-backend-h2
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Spring Boot Configuration
      SPRING_PROFILES_ACTIVE: local
      PORT: 8080
      
      # Queue Mode - Local (no RabbitMQ needed)
      APP_QUEUE_MODE: local
      
      # JWT Security
      APP_JWT_SECRET: ${APP_JWT_SECRET:-ScannerXLocalTestSecret2026_ScannerXLocalTestSecret2026}
      APP_JWT_EXPIRATION_MS: 86400000
      
      # CORS Configuration (allow localhost and localhost:5173 for Vercel dev)
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:8080
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: http://localhost:*,http://127.0.0.1:*,https://scannerx.vercel.app,https://*.vercel.app
      
      # AI Finding Enrichment (disabled for local testing)
      AI_FINDING_ENRICHMENT_ENABLED: "false"
      HF_API_TOKEN: ""
      HF_MODEL_ID: Qwen/Qwen2.5-7B-Instruct
      HF_PROVIDER: ""
      
      # Database (H2 file storage)
      DB_USERNAME: sa
      DB_PASSWORD: ""
      
      # Logging
      LOGGING_LEVEL_COM_SCANNER_APP: DEBUG
      LOGGING_LEVEL_ROOT: INFO
    
    volumes:
      # Persist H2 database between restarts
      - ./backend/data:/app/data
      # Optional: Bind logs
      - ./logs/backend:/app/logs
    
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    networks:
      - scannerx-network

  # Frontend - Development mode (optional, for integrated testing)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: scannerx-frontend-h2
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Backend API Configuration
      VITE_API_BASE_URL: http://127.0.0.1:8080/api
      VITE_WS_BASE_URL: http://127.0.0.1:8080
    
    volumes:
      # Hot reload during development
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    
    depends_on:
      backend:
        condition: service_healthy
    
    networks:
      - scannerx-network

volumes:
  scannerx-h2-data:

networks:
  scannerx-network:
    driver: bridge
