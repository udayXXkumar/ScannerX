spring.application.name=ScannerX
spring.profiles.default=postgres

server.port=${PORT:${SERVER_PORT:8080}}

app.jwt.secret=${APP_JWT_SECRET:ScannerXDevJwtSecretKey_2026_ScannerXDevJwtSecretKey_2026}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.queue.mode=${APP_QUEUE_MODE:local}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:8080}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

app.ai.finding-enrichment.enabled=${AI_FINDING_ENRICHMENT_ENABLED:true}
app.ai.finding-enrichment.timeout-ms=${AI_ENRICHMENT_TIMEOUT_MS:15000}
app.ai.finding-enrichment.max-retries=${AI_ENRICHMENT_MAX_RETRIES:1}
app.ai.finding-enrichment.max-input-chars=${AI_ENRICHMENT_MAX_INPUT_CHARS:6000}
app.ai.finding-enrichment.concurrency=${AI_ENRICHMENT_CONCURRENCY:2}
app.ai.hf.api-token=${HF_API_TOKEN:}
app.ai.hf.model-id=${HF_MODEL_ID:Qwen/Qwen2.5-7B-Instruct}
app.ai.hf.provider=${HF_PROVIDER:}


