app.db.host=${DB_HOST:localhost}
app.db.port=${DB_PORT:5432}
app.db.name=${DB_NAME:scannerx}
app.db.username=${DB_USERNAME:scannerx}
app.db.password=${DB_PASSWORD:scannerx}

app.rabbit.host=${RABBITMQ_HOST:localhost}
app.rabbit.port=${RABBITMQ_PORT:5672}
app.rabbit.username=${RABBITMQ_USERNAME:guest}
app.rabbit.password=${RABBITMQ_PASSWORD:guest}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${app.db.host}:${app.db.port}/${app.db.name}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${app.db.username}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${app.db.password}}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration-postgres

spring.rabbitmq.host=${app.rabbit.host}
spring.rabbitmq.port=${app.rabbit.port}
spring.rabbitmq.username=${app.rabbit.username}
spring.rabbitmq.password=${app.rabbit.password}
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_AUTOSTART:false}
spring.rabbitmq.listener.direct.auto-startup=${RABBITMQ_AUTOSTART:false}

management.health.rabbit.enabled=${RABBITMQ_HEALTH_ENABLED:false}

app.queue.mode=${APP_QUEUE_MODE:local}
