app.db.host=${DB_HOST:localhost}
app.db.port=${DB_PORT:3306}
app.db.name=${DB_NAME:scannerx}
app.db.username=${DB_USERNAME:scanner}
app.db.password=${DB_PASSWORD:scanner_pass}

app.rabbit.host=${RABBITMQ_HOST:localhost}
app.rabbit.port=${RABBITMQ_PORT:5672}
app.rabbit.username=${RABBITMQ_USERNAME:guest}
app.rabbit.password=${RABBITMQ_PASSWORD:guest}

spring.datasource.url=jdbc:mysql://${app.db.host}:${app.db.port}/${app.db.name}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${app.db.username}
spring.datasource.password=${app.db.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.rabbitmq.host=${app.rabbit.host}
spring.rabbitmq.port=${app.rabbit.port}
spring.rabbitmq.username=${app.rabbit.username}
spring.rabbitmq.password=${app.rabbit.password}
spring.rabbitmq.listener.simple.auto-startup=${RABBITMQ_AUTOSTART:false}
spring.rabbitmq.listener.direct.auto-startup=${RABBITMQ_AUTOSTART:false}

management.health.rabbit.enabled=${RABBITMQ_HEALTH_ENABLED:false}

app.queue.mode=${APP_QUEUE_MODE:local}
