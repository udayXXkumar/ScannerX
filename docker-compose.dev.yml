services:
  db:
    image: postgres:17
    container_name: scannerx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scannerx
      POSTGRES_USER: scannerx
      POSTGRES_PASSWORD: scannerx
    ports:
      - "5433:5432"
    volumes:
      - scannerx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scannerx -d scannerx"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: scannerx-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  scannerx_postgres_data:
